name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cross-section-studio:ci .

      - name: Smoke container health
        run: |
          docker run -d --name css-ci -p 18501:8501 cross-section-studio:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18501/_stcore/health >/dev/null; then
              echo "health ok"
              docker rm -f css-ci
              exit 0
            fi
            sleep 2
          done
          docker logs css-ci
          docker rm -f css-ci
          exit 1
